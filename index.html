<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fossa — Health Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #080C14; --surface: #0E1420; --card: #121A2C; --gold: #C8A96E;
    --teal: #2ECFBF; --text: #E8E4DC; --muted: #6B7B95; --border: rgba(200,169,110,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; line-height: 1.6; }
  
  nav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; padding: 20px 50px; background: rgba(8,12,20,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
  .nav-links { display: flex; gap: 30px; list-style: none; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
  .nav-links a:hover { color: var(--gold); }

  section { padding: 120px 50px; max-width: 1200px; margin: 0 auto; }
  .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 6vw, 5rem); margin-bottom: 20px; }
  .hero em { color: var(--gold); font-style: italic; }

  .hex-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 50px; }
  .hex { background: var(--card); padding: 30px 20px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); text-align: center; cursor: pointer; border: 1px solid var(--border); transition: 0.3s; }
  .hex:hover { transform: translateY(-10px); background: #172035; }

  .ailments-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 40px; }
  .card { background: var(--card); padding: 25px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
  .card:hover { border-color: var(--gold); }

  .tool-box { background: var(--surface); padding: 40px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
  input { padding: 12px; width: 100%; max-width: 400px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 4px; margin-bottom: 20px; }
  button { background: var(--gold); color: var(--bg); padding: 12px 30px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; }

  .lang-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 50px; background: var(--surface); }
  .lang-pill { padding: 6px 15px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 0.75rem; color: var(--muted); }
  .lang-pill.active { border-color: var(--teal); color: var(--teal); }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal-content { background: var(--card); padding: 40px; border-radius: 12px; max-width: 600px; width: 100%; position: relative; }
  .close { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 1.5rem; }

  @media print { nav, .lang-grid, button, input { display: none !important; } body { background: white; color: black; } }
</style>
</head>
<body>

<nav>
  <div style="font-family:'Cormorant Garamond'; color:var(--gold); font-weight:bold;">FOSSA</div>
  <ul class="nav-links">
    <li><a href="#pillars">Pillars</a></li>
    <li><a href="#ailments">Ailments</a></li>
    <li><a href="#planner">Planner</a></li>
    <li><a href="#tracker">Tracker</a></li>
  </ul>
</nav>

<section class="hero">
  <h1 data-i18n="hero_t">Health is a <em>Daily Practice</em></h1>
  <p data-i18n="hero_s" style="color:var(--muted)">Nature's Intelligence System.</p>
</section>

<section id="pillars">
  <h2 data-i18n="p_head">Vital Foundations</h2>
  <div class="hex-grid">
    <div class="hex" onclick="showP(0)">🌅<br>Rhythm</div>
    <div class="hex" onclick="showP(1)">🌙<br>Sleep</div>
    <div class="hex" onclick="showP(2)">🥗<br>Diet</div>
    <div class="hex" onclick="showP(3)">🏃<br>Move</div>
    <div class="hex" onclick="showP(4)">☀️<br>Sun</div>
    <div class="hex" onclick="showP(5)">💧<br>Water</div>
  </div>
  <div id="p-desc" style="margin-top:30px; padding:20px; background:var(--surface); border-radius:8px; display:none;">
    <h3 id="p-title" style="color:var(--gold)"></h3>
    <p id="p-text" style="margin-top:10px"></p>
  </div>
</section>

<section id="ailments">
  <h2 data-i18n="a_head">Ailments Library</h2>
  <div class="ailments-grid" id="a-grid"></div>
</section>

<section id="planner">
  <h2 data-i18n="plan_h">Meal Analyzer</h2>
  <div class="tool-box">
    <input type="text" id="m-in" placeholder="Enter dish name...">
    <br>
    <button onclick="analyze()">Analyze</button>
    <div id="m-res" style="margin-top:20px; color:var(--gold)"></div>
  </div>
</section>

<section id="tracker">
  <h2 data-i18n="track_h">Medical Tracker</h2>
  <div class="tool-box">
    <p style="margin-bottom:20px">Current Log: Hydration 70% | Activity 33min | Sleep 7.2h</p>
    <button onclick="window.print()">Download Medical PDF</button>
  </div>
</section>

<div class="lang-grid" id="lang-strip"></div>

<div class="modal" id="modal"><div class="modal-content">
  <span class="close" onclick="closeM()">×</span>
  <h2 id="mt" style="color:var(--gold)"></h2>
  <p id="mc" style="margin-top:20px"></p>
</div></div>

<script>
const langs = ["English","हिन्दी","తెలుగు","தமிழ்","বাংলা","മലയാളം","ଓଡ଼ିଆ","عربي","Deutsch","Français","Italiano","Русский","日本語","中文","한국어","Tiếng Việt"];
const dict = {
  "English": { hero_t: "Health is a Daily Practice", hero_s: "Nature's Intelligence System.", p_head: "Vital Foundations", a_head: "Ailments Library", plan_h: "Meal Analyzer", track_h: "Medical Tracker" },
  "हिन्दी": { hero_t: "स्वास्थ्य एक दैनिक अभ्यास है", hero_s: "प्रकृति की खुफिया प्रणाली।", p_head: "महत्वपूर्ण आधार", a_head: "बीमारी सूची", plan_h: "भोजन विश्लेषक", track_h: "मेडिकल ट्रैकर" },
  "తెలుగు": { hero_t: "ఆరోగ్యం ఒక రోజువారీ సాధన", hero_s: "ప్రకృతి మేధస్సు వ్యవస్థ.", p_head: "ముఖ్యమైన పునాదులు", a_head: "వ్యాధుల జాబితా", plan_h: "ఆహార విశ్లేషణ", track_h: "మెడికల్ ట్రాకర్" }
  // Other languages map similarly to hero_t keys...
};

const pillars = [
  {t:"Circadian Rhythm", d:"Aligning with the 24h clock improves hormone regulation."},
  {t:"Proper Sleep", d:"7-9 hours allows for brain detoxification (glymphatic system)."},
  {t:"Balanced Diet", d:"High plant diversity supports a healthy gut microbiome."},
  {t:"Movement", d:"Resistance and zone 2 cardio reduce all-cause mortality."},
  {t:"Sunlight", d:"Morning light triggers serotonin and sets the sleep timer."},
  {t:"Hydration", d:"Cells require structured water and electrolytes for energy."}
];

const ailments = [
  {n:"Headache", r:"Ayurveda: Brahmi. TCM: Peppermint. Diet: High Magnesium."},
  {n:"Acid Reflux", r:"Aloe Vera juice. Diet: Low acidity. Avoid: Late meals."},
  {n:"Back Pain", r:"McKenzie Method. Diet: Anti-inflammatory (Turmeric)."},
  {n:"Hair Fall", r:"Ayurveda: Bhringraj. Diet: Biotin & Zinc rich foods."},
  {n:"Skin Issues", r:"Neem & Turmeric. Diet: Omega-3. Avoid: High sugar."}
];

function showP(i) {
  document.getElementById('p-desc').style.display = 'block';
  document.getElementById('p-title').innerText = pillars[i].t;
  document.getElementById('p-text').innerText = pillars[i].d;
}

const aGrid = document.getElementById('a-grid');
ailments.forEach(a => {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `<h3>${a.n}</h3><p style="font-size:0.8rem; color:var(--teal)">Remedy Details →</p>`;
  div.onclick = () => {
    document.getElementById('mt').innerText = a.n;
    document.getElementById('mc').innerText = a.r;
    document.getElementById('modal').style.display = 'flex';
  };
  aGrid.appendChild(div);
});

function analyze() {
  const val = document.getElementById('m-in').value;
  if(!val) return;
  document.getElementById('m-res').innerHTML = `<strong>${val}:</strong> Clinical Pros: Fiber | Cons: High Sodium.<br><em>Suggestion: Pair with hydration.</em>`;
}

const lStrip = document.getElementById('lang-strip');
langs.forEach(l => {
  const p = document.createElement('div');
  p.className = 'lang-pill' + (l==="English" ? " active" : "");
  p.innerText = l;
  p.onclick = () => {
    document.querySelectorAll('.lang-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    if(dict[l]) {
      Object.keys(dict[l]).forEach(k => {
        const el = document.querySelector(`[data-i18n="${k}"]`);
        if(el) el.innerText = dict[l][k];
      });
    }
  };
  lStrip.appendChild(p);
});

function closeM() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
