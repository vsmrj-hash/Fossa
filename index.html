<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fossa Health Tracker</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0f1a;
  color:#fff;
}

.container{
  max-width:800px;
  margin:auto;
  padding:40px 20px;
}

h1{
  text-align:center;
}

.tracker-row{
  margin:20px 0;
  padding:15px;
  background:#121a2c;
  border-radius:8px;
  cursor:pointer;
}

.label{
  display:flex;
  justify-content:space-between;
}

.bar-wrap{
  height:8px;
  background:#1a2235;
  border-radius:4px;
  margin-top:10px;
}

.bar{
  height:100%;
  background:#2ecfbf;
  border-radius:4px;
}

button{
  width:100%;
  padding:14px;
  margin-top:30px;
  border:none;
  background:#c8a96e;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>FOSSA TRACKER</h1>

<div class="tracker-row" data-max="3">
  <div class="label">💧 Water <span class="val">2.2</span>L</div>
  <div class="bar-wrap"><div class="bar" style="width:73%"></div></div>
</div>

<div class="tracker-row" data-max="8">
  <div class="label">🌙 Sleep <span class="val">7.2</span>h</div>
  <div class="bar-wrap"><div class="bar" style="width:90%"></div></div>
</div>

<div class="tracker-row" data-max="60">
  <div class="label">🏃 Activity <span class="val">33</span>min</div>
  <div class="bar-wrap"><div class="bar" style="width:55%"></div></div>
</div>

<div class="tracker-row" data-max="2500">
  <div class="label">🥗 Nutrition <span class="val">1820</span> kcal</div>
  <div class="bar-wrap"><div class="bar" style="width:72%"></div></div>
</div>

<button id="download">Download Report</button>

</div>

<script>

// EDIT VALUES

document.querySelectorAll('.tracker-row').forEach(row=>{
  row.addEventListener('click',()=>{

    const valEl=row.querySelector('.val');
    const max=parseFloat(row.dataset.max);
    const current=parseFloat(valEl.innerText);

    let input=prompt('Enter new value',current);
    if(input===null) return;

    input=parseFloat(input);
    if(isNaN(input)) return;

    valEl.innerText=input;

    let percent=(input/max)*100;
    if(percent>100) percent=100;

    row.querySelector('.bar').style.width=percent+'%';
  });
});

// DOWNLOAD REPORT

 document.getElementById('download').addEventListener('click',()=>{

  const rows=document.querySelectorAll('.tracker-row');

  const data=`FOSSA HEALTH REPORT\n\n
Water: ${rows[0].innerText}
Sleep: ${rows[1].innerText}
Activity: ${rows[2].innerText}
Nutrition: ${rows[3].innerText}`;

  const blob=new Blob([data],{type:'text/plain'});
  const url=URL.createObjectURL(blob);

  const a=document.createElement('a');
  a.href=url;
  a.download='fossa-report.txt';
  a.click();

  URL.revokeObjectURL(url);
});

</script>

</body>
</html>
